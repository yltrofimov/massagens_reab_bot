name: Post to Telegram

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 9 */3 * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install groq requests python-dotenv
      
      - name: Debug network (optional)
        run: |
          echo "Testing connection to Groq API..."
          curl -I https://api.groq.com --max-time 10 || echo "Connection test failed, but continuing..."
      
      - name: Run agent with retry
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            python agent.py && break
            if [ $i -lt 5 ]; then
              echo "Attempt $i failed, retrying in 15 seconds..."
              sleep 15
            else
              echo "All 5 attempts failed"
              exit 1
            fi
          done
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODERATOR_ID: ${{ secrets.MODERATOR_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        timeout-minutes: 350
